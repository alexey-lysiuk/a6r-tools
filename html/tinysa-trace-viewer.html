<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tinySA Ultra Trace Viewer</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* ── Theme variables ────────────────────────────────────────────────── */
        :root {
            --body-bg:        #1a1a2e;
            --text:           #e0e0e0;
            --heading:        #a0c4ff;
            --label:          #b0b8c8;
            --input-bg:       #16213e;
            --input-border:   #334455;
            --input-text:     #e0e0e0;
            --btn-bg:         #0f3460;
            --btn-text:       #a0c4ff;
            --btn-hover:      #1a5276;
            --error:          #f08080;
            --wrapper-bg:     #16213e;
            --wrapper-border: #334455;
            --tooltip-bg:     rgba(10, 20, 40, 0.92);
            --tooltip-border: #446688;
            --tooltip-text:   #d0dce8;
        }

        body.light {
            --body-bg:        #f0f2f5;
            --text:           #303848;
            --heading:        #1a3a6e;
            --label:          #404860;
            --input-bg:       #ffffff;
            --input-border:   #b0bcc8;
            --input-text:     #303848;
            --btn-bg:         #3060a0;
            --btn-text:       #ffffff;
            --btn-hover:      #204080;
            --error:          #c02020;
            --wrapper-bg:     #ffffff;
            --wrapper-border: #b0bcc8;
            --tooltip-bg:     rgba(240, 242, 245, 0.95);
            --tooltip-border: #8090a8;
            --tooltip-text:   #303848;
        }

        body {
            font-family: sans-serif;
            background: var(--body-bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 16px;
            color: var(--heading);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--input-border);
            flex-shrink: 0;
        }

        label[for="fileInput"] {
            font-size: 0.9rem;
            color: var(--label);
        }

        input[type="file"] {
            font-size: 0.85rem;
            color: var(--input-text);
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button,
        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 3px;
            padding: 4px 10px;
            cursor: pointer;
            margin-right: 8px;
        }

        input[type="file"]::-webkit-file-upload-button:hover,
        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        #message {
            font-size: 0.85rem;
            color: var(--error);
            min-height: 1.2em;
        }

        /* ── Theme toggle button ────────────────────────────────────────────── */
        #themeBtn {
            font-size: 0.82rem;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            white-space: nowrap;
        }

        #themeBtn:hover {
            background: var(--btn-hover);
        }

        /* ── Trace colour pickers ───────────────────────────────────────────── */
        .color-pickers {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-pickers > span {
            font-size: 0.82rem;
            color: var(--label);
        }

        .cp-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.82rem;
            color: var(--label);
            cursor: pointer;
        }

        .cp-item input[type="color"] {
            width: 28px;
            height: 22px;
            padding: 1px 2px;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            background: var(--input-bg);
            cursor: pointer;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            background: var(--wrapper-bg);
            border: 1px solid var(--wrapper-border);
            border-radius: 6px;
            padding: 8px;
        }

        #chart {
            display: block;
            width: 100%;
            cursor: crosshair;
        }

        #tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.78rem;
            color: var(--tooltip-text);
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }
    </style>
</head>
<body>
    <h1>tinySA Ultra Trace Viewer</h1>

    <div class="toolbar">
        <label for="fileInput">Load trace file (.csv):</label>
        <input type="file" id="fileInput" accept=".csv">
        <span id="message"></span>

        <div class="toolbar-sep"></div>
        <button id="themeBtn" title="Toggle light/dark theme">☀ Light</button>

        <div class="toolbar-sep"></div>
        <div class="color-pickers">
            <span>Trace colors:</span>
            <label class="cp-item" title="Trace 1 color" aria-label="Trace 1 color picker">
                1 <input type="color" id="color0" value="#ffcc00">
            </label>
            <label class="cp-item" title="Trace 2 color" aria-label="Trace 2 color picker">
                2 <input type="color" id="color1" value="#44dd44">
            </label>
            <label class="cp-item" title="Trace 3 color" aria-label="Trace 3 color picker">
                3 <input type="color" id="color2" value="#ff44cc">
            </label>
            <label class="cp-item" title="Trace 4 color" aria-label="Trace 4 color picker">
                4 <input type="color" id="color3" value="#ff4444">
            </label>
        </div>
    </div>

    <div class="chart-wrapper" id="chartWrapper">
        <canvas id="chart"></canvas>
        <div id="tooltip"></div>
    </div>

    <script>
        'use strict';

        /* ── Default trace colours (yellow, light green, magenta, red) ─────── */
        const DEFAULT_TRACE_COLORS = ['#ffcc00', '#44dd44', '#ff44cc', '#ff4444'];

        /* Mutable per-trace colours, kept in sync with the colour pickers */
        const traceColors = DEFAULT_TRACE_COLORS.slice();

        /* ── Canvas theme palettes ──────────────────────────────────────────── */
        const THEMES = {
            dark: {
                canvasBg:     '#16213e',
                grid:         'rgba(255,255,255,0.07)',
                tick:         '#7890a8',
                axisLabel:    '#b0b8c8',
                plotBorder:   '#334466',
                legendBg:     'rgba(10,20,40,0.75)',
                legendBorder: '#334466',
                legendText:   '#b0b8c8',
                chartTitle:   '#607090',
            },
            light: {
                canvasBg:     '#ffffff',
                grid:         'rgba(0,0,0,0.07)',
                tick:         '#607080',
                axisLabel:    '#404860',
                plotBorder:   '#8090a8',
                legendBg:     'rgba(240,242,245,0.90)',
                legendBorder: '#8090a8',
                legendText:   '#404860',
                chartTitle:   '#6080a0',
            },
        };

        let currentTheme = 'dark';

        /* ── DOM references ─────────────────────────────────────────────────── */
        const fileInput  = document.getElementById('fileInput');
        const messageEl  = document.getElementById('message');
        const canvas     = document.getElementById('chart');
        const tooltip    = document.getElementById('tooltip');
        const wrapper    = document.getElementById('chartWrapper');
        const themeBtn   = document.getElementById('themeBtn');

        /* ── Theme toggle ───────────────────────────────────────────────────── */
        themeBtn.addEventListener('click', () => {
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                document.body.classList.add('light');
                themeBtn.textContent = '🌙 Dark';
            } else {
                currentTheme = 'dark';
                document.body.classList.remove('light');
                themeBtn.textContent = '☀ Light';
            }
            if (chartData) drawChart();
        });

        /* ── Colour picker sync ─────────────────────────────────────────────── */
        for (let i = 0; i < DEFAULT_TRACE_COLORS.length; i++) {
            const picker = document.getElementById('color' + i);
            picker.addEventListener('input', () => {
                traceColors[i] = picker.value;
                if (chartData) drawChart();
            });
        }

        /* ── Chart state ────────────────────────────────────────────────────── */
        let chartData = null;   // { frequencies, traces, filename }

        /* ── File loading ───────────────────────────────────────────────────── */
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = parseCSV(e.target.result);
                    if (parsed.frequencies.length === 0) {
                        showMessage('No data found in the selected file.');
                        return;
                    }
                    showMessage('');
                    chartData = { ...parsed, filename: file.name };
                    drawChart();
                } catch (err) {
                    showMessage('Failed to parse file: ' + err.message);
                }
            };
            reader.readAsText(file);
        });

        window.addEventListener('resize', () => { if (chartData) drawChart(); });

        function showMessage(text) {
            messageEl.textContent = text;
        }

        /* ── CSV parser ─────────────────────────────────────────────────────── */
        /**
         * Parse a tinySA Ultra CSV trace file.
         *
         * Each non-empty line has the form:
         *   <frequency_hz>,  <power1> [power2] [power3] [power4]
         *
         * Returns:
         *   frequencies – array of frequency values in Hz
         *   traces      – array of up to 4 arrays of dBm values
         */
        function parseCSV(text) {
            const lines = text.split('\n');
            const freqArr  = [];
            const rawTraces = [[], [], [], []];
            let traceCount = 0;

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                const commaIdx = trimmed.indexOf(',');
                if (commaIdx === -1) continue;

                const freq = parseFloat(trimmed.slice(0, commaIdx));
                if (!isFinite(freq)) continue;

                const rest   = trimmed.slice(commaIdx + 1).trim();
                const values = rest.split(/\s+/).filter(Boolean).map(Number);
                if (values.length === 0 || values.some(v => !isFinite(v))) continue;

                freqArr.push(freq);

                const count = Math.min(values.length, 4);
                for (let i = 0; i < count; i++) {
                    rawTraces[i].push(values[i]);
                    if (i + 1 > traceCount) traceCount = i + 1;
                }
            }

            return {
                frequencies: freqArr,
                traces: rawTraces.slice(0, traceCount),
            };
        }

        /* ── Canvas chart renderer ──────────────────────────────────────────── */

        /** Layout constants (pixels) */
        const PAD_LEFT   = 70;
        const PAD_RIGHT  = 20;
        const PAD_TOP    = 36;
        const PAD_BOTTOM = 52;

        function drawChart() {
            const { frequencies, traces, filename } = chartData;
            const th   = THEMES[currentTheme];
            const dpr  = window.devicePixelRatio || 1;

            /* Size the canvas to fill the wrapper */
            const cssW = wrapper.clientWidth - 16; // 8px padding each side
            const cssH = Math.max(320, Math.round(cssW / 2.6));
            canvas.style.width  = cssW + 'px';
            canvas.style.height = cssH + 'px';
            canvas.width  = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);

            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const plotW = cssW - PAD_LEFT - PAD_RIGHT;
            const plotH = cssH - PAD_TOP  - PAD_BOTTOM;

            /* ── Data ranges ── */
            const freqMin = frequencies[0];
            const freqMax = frequencies[frequencies.length - 1];

            const allDbm = traces.flat();
            const rawMin = Math.min(...allDbm);
            const rawMax = Math.max(...allDbm);
            const step   = niceStep(rawMax - rawMin, 8);
            const yMin   = Math.floor(rawMin / step) * step;
            const yMax   = Math.ceil(rawMax  / step) * step;

            /* ── Coordinate transforms ── */
            const xScale = (f)   => PAD_LEFT + (f - freqMin) / (freqMax - freqMin) * plotW;
            const yScale = (dbm) => PAD_TOP  + (yMax - dbm)  / (yMax   - yMin)     * plotH;

            /* ── Clear ── */
            ctx.clearRect(0, 0, cssW, cssH);

            /* ── Background ── */
            ctx.fillStyle = th.canvasBg;
            ctx.fillRect(0, 0, cssW, cssH);

            /* ── Grid + Y-axis ticks ── */
            ctx.strokeStyle = th.grid;
            ctx.lineWidth   = 1;
            ctx.font        = '11px sans-serif';
            ctx.fillStyle   = th.tick;
            ctx.textAlign   = 'right';
            ctx.textBaseline = 'middle';

            for (let v = yMin; v <= yMax + 1e-9; v += step) {
                const y = Math.round(yScale(v)) + 0.5;
                ctx.beginPath();
                ctx.moveTo(PAD_LEFT, y);
                ctx.lineTo(PAD_LEFT + plotW, y);
                ctx.stroke();
                ctx.fillText(v.toFixed(0) + ' dBm', PAD_LEFT - 6, y);
            }

            /* ── Grid + X-axis ticks ── */
            const xTicks = niceFreqTicks(freqMin, freqMax, 10);
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'top';

            for (const f of xTicks) {
                const x = Math.round(xScale(f)) + 0.5;
                ctx.strokeStyle = th.grid;
                ctx.lineWidth   = 1;
                ctx.beginPath();
                ctx.moveTo(x, PAD_TOP);
                ctx.lineTo(x, PAD_TOP + plotH);
                ctx.stroke();

                ctx.fillStyle = th.tick;
                ctx.fillText(formatFreq(f), x, PAD_TOP + plotH + 6);
            }

            /* ── Plot border ── */
            ctx.strokeStyle = th.plotBorder;
            ctx.lineWidth   = 1;
            ctx.strokeRect(PAD_LEFT + 0.5, PAD_TOP + 0.5, plotW, plotH);

            /* ── Traces ── */
            ctx.save();
            ctx.rect(PAD_LEFT, PAD_TOP, plotW, plotH);
            ctx.clip();

            for (let ti = 0; ti < traces.length; ti++) {
                const trace = traces[ti];
                ctx.strokeStyle = traceColors[ti];
                ctx.lineWidth   = 1.5;
                ctx.beginPath();
                for (let i = 0; i < frequencies.length; i++) {
                    const x = xScale(frequencies[i]);
                    const y = yScale(trace[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else         ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            ctx.restore();

            /* ── Axis labels ── */
            ctx.fillStyle    = th.axisLabel;
            ctx.font         = '12px sans-serif';
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('Frequency', PAD_LEFT + plotW / 2, cssH - 2);

            ctx.save();
            ctx.translate(14, PAD_TOP + plotH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textBaseline = 'top';
            ctx.fillText('Power (dBm)', 0, 0);
            ctx.restore();

            /* ── File name title ── */
            ctx.fillStyle    = th.chartTitle;
            ctx.font         = '11px sans-serif';
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(filename, PAD_LEFT + plotW / 2, 6);

            /* ── Legend (only when more than one trace) ── */
            if (traces.length > 1) {
                const lineLen   = 18;
                const gap       = 4;
                const labelW    = 52;  // width of "Trace X" in 11px font
                const itemH     = 18;
                const legW      = lineLen + gap + labelW + 12;
                const legH      = traces.length * itemH + 8;
                const lx        = PAD_LEFT + plotW - legW - 6;
                const ly        = PAD_TOP + 8;

                /* semi-transparent background box */
                ctx.fillStyle = th.legendBg;
                ctx.fillRect(lx, ly, legW, legH);
                ctx.strokeStyle = th.legendBorder;
                ctx.lineWidth   = 1;
                ctx.strokeRect(lx + 0.5, ly + 0.5, legW, legH);

                for (let ti = 0; ti < traces.length; ti++) {
                    const y = ly + 4 + ti * itemH;
                    ctx.strokeStyle = traceColors[ti];
                    ctx.lineWidth   = 2;
                    ctx.beginPath();
                    ctx.moveTo(lx + 6,              y + itemH / 2);
                    ctx.lineTo(lx + 6 + lineLen,    y + itemH / 2);
                    ctx.stroke();

                    ctx.fillStyle    = th.legendText;
                    ctx.font         = '11px sans-serif';
                    ctx.textAlign    = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Trace ' + (ti + 1), lx + 6 + lineLen + gap, y + itemH / 2);
                }
            }

            /* ── Store layout for tooltip ── */
            canvas._layout = { xScale, yScale, plotW, plotH, freqMin, freqMax, yMin, yMax };
        }

        /* ── Tooltip on mouse move ──────────────────────────────────────────── */
        canvas.addEventListener('mousemove', (e) => {
            if (!chartData || !canvas._layout) return;
            const { xScale, yScale, plotW, plotH, freqMin, freqMax } = canvas._layout;
            const { frequencies, traces } = chartData;

            const rect = canvas.getBoundingClientRect();
            const mx   = e.clientX - rect.left;
            const my   = e.clientY - rect.top;

            if (mx < PAD_LEFT || mx > PAD_LEFT + plotW ||
                my < PAD_TOP  || my > PAD_TOP  + plotH) {
                tooltip.style.display = 'none';
                return;
            }

            /* Find closest frequency index */
            const frac = (mx - PAD_LEFT) / plotW;
            const fVal = freqMin + frac * (freqMax - freqMin);
            let idx = 0;
            let bestDist = Infinity;
            for (let i = 0; i < frequencies.length; i++) {
                const d = Math.abs(frequencies[i] - fVal);
                if (d < bestDist) { bestDist = d; idx = i; }
            }

            let html = '<b>' + formatFreq(frequencies[idx]) + '</b>';
            for (let ti = 0; ti < traces.length; ti++) {
                const label = traces.length > 1 ? 'Trace ' + (ti + 1) : 'Power';
                html += '<br><span style="color:' + traceColors[ti] + '">' + label + '</span>: '
                      + traces[ti][idx].toFixed(2) + ' dBm';
            }
            tooltip.innerHTML = html;

            /* Position tooltip so it stays within wrapper */
            tooltip.style.display = 'block';
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;
            let tx = mx + 14;
            let ty = my - th / 2;
            if (tx + tw > wrapper.clientWidth - 8) tx = mx - tw - 14;
            if (ty < 4) ty = 4;
            tooltip.style.left = tx + 'px';
            tooltip.style.top  = ty + 'px';
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        /* ── Utility functions ──────────────────────────────────────────────── */

        /** Choose a "nice" tick step for the given data range and target count. */
        function niceStep(range, targetCount) {
            const raw       = range / targetCount;
            const magnitude = Math.pow(10, Math.floor(Math.log10(raw)));
            const n         = raw / magnitude;
            let step;
            if      (n <= 1)  step = 1;
            else if (n <= 2)  step = 2;
            else if (n <= 5)  step = 5;
            else              step = 10;
            return step * magnitude;
        }

        /** Generate evenly-spaced frequency tick values across [fMin, fMax]. */
        function niceFreqTicks(fMin, fMax, maxCount) {
            const step  = niceStep(fMax - fMin, maxCount);
            const start = Math.ceil(fMin / step) * step;
            const ticks = [];
            for (let f = start; f <= fMax + 1e-9; f += step) {
                ticks.push(f);
            }
            return ticks;
        }

        /** Format a frequency value (in Hz) with an appropriate SI suffix. */
        function formatFreq(hz) {
            if (hz >= 1e9)  return (hz / 1e9).toFixed(3).replace(/\.?0+$/, '') + ' GHz';
            if (hz >= 1e6)  return (hz / 1e6).toFixed(3).replace(/\.?0+$/, '') + ' MHz';
            if (hz >= 1e3)  return (hz / 1e3).toFixed(3).replace(/\.?0+$/, '') + ' kHz';
            return hz.toFixed(0) + ' Hz';
        }
    </script>
</body>
</html>
